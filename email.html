<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f4f4;
        }

        .search-box {
            width: 500px;
            text-align: center;
        }

        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 25px;
        }

        button {
            padding: 12px 20px;
            border: none;
            background: #4285f4;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            margin-left: 10px;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="search-box">
        <h2>Search</h2>

        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            <input
                type="text"
                name="search_query"
                placeholder="Type anything..."
                required
            >
            <button type="submit">Search</button>
        </form>
    </div>

</body>
</html>
