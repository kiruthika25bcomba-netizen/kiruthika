<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Login</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#004080,#0073e6);
    }

    .login-container{
        background:#fff;
        padding:40px;
        width:350px;
        border-radius:12px;
        box-shadow:0 8px 20px rgba(0,0,0,0.2);
        text-align:center;
    }

    .logo{
        width:90px;
        height:90px;
        object-fit:contain;
        margin-bottom:15px;
    }

    h2{
        color:#004080;
        margin-bottom:20px;
    }

    .input-group{
        margin-bottom:15px;
        text-align:left;
    }

    .input-group label{
        display:block;
        margin-bottom:5px;
        font-weight:bold;
    }

    .input-group input{
        width:100%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:6px;
    }

    .login-btn{
        width:100%;
        padding:12px;
        border:none;
        border-radius:6px;
        background:#004080;
        color:white;
        font-size:16px;
        cursor:pointer;
    }

    .login-btn:hover{
        background:#0059b3;
    }

    .footer{
        margin-top:15px;
        font-size:13px;
        color:#666;
    }
</style>
</head>
<body>

<div class="login-container">
    <img src="logo.png" alt="College Logo" class="logo">

    <h2>College Login</h2>

    <form>
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="footer">
        © 2026 Your College Name
    </div>
</div>

</body>
</html>
